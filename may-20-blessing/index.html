<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>5月20日祝福</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%2316222c'/%3E%3Cpath d='M8 18h4v-4h4v-4h4v4h4v4h-4v4h-4v4h-4v-4H8z' fill='%23ffd36b'/%3E%3C/svg%3E">
  <style>
    :root {
      color-scheme: dark;
      --ink: #16222c;
      --deep: #1d3440;
      --teal: #2f6f73;
      --leaf: #66bf7a;
      --cream: #fff1c7;
      --gold: #ffd36b;
      --rose: #e86a7a;
      --blue: #79c7d8;
      --shadow: rgba(8, 14, 20, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      padding: 18px;
      overflow: hidden;
      background: linear-gradient(180deg, #16222c 0%, #1d3440 48%, #274b3f 100%);
      color: var(--cream);
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", system-ui, sans-serif;
    }

    .journey {
      position: relative;
      width: min(1100px, 100%);
      height: min(720px, calc(100vh - 36px));
      min-height: 560px;
      border: 4px solid var(--cream);
      background: #172631;
      box-shadow:
        0 0 0 5px #101820,
        0 22px 70px var(--shadow);
      image-rendering: pixelated;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      cursor: pointer;
      touch-action: manipulation;
    }

    .hud {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 18px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: end;
      pointer-events: none;
    }

    .message {
      min-height: 116px;
      padding: 16px 18px;
      border: 4px solid #101820;
      background: rgba(255, 241, 199, 0.94);
      color: var(--ink);
      box-shadow: 7px 7px 0 var(--shadow);
    }

    .badge {
      display: inline-block;
      margin-bottom: 8px;
      padding: 5px 8px;
      border: 3px solid var(--ink);
      background: var(--gold);
      color: var(--ink);
      font-size: 13px;
      font-weight: 900;
      line-height: 1;
    }

    h1 {
      margin: 0;
      color: var(--ink);
      font-size: clamp(24px, 4vw, 42px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .line {
      margin: 8px 0 0;
      color: #29404b;
      font-size: clamp(15px, 2vw, 20px);
      line-height: 1.45;
    }

    .panel {
      display: grid;
      gap: 10px;
      justify-items: end;
      pointer-events: auto;
    }

    .pips {
      display: flex;
      gap: 7px;
      padding: 8px;
      border: 3px solid var(--cream);
      background: rgba(16, 24, 32, 0.8);
      box-shadow: 5px 5px 0 var(--shadow);
    }

    .pip {
      width: 14px;
      height: 14px;
      border: 2px solid var(--cream);
      background: transparent;
    }

    .pip.active {
      background: var(--gold);
    }

    button {
      min-width: 132px;
      min-height: 50px;
      border: 4px solid #101820;
      border-radius: 0;
      background: var(--rose);
      color: #fffdf2;
      font: 900 16px/1 "PingFang SC", "Microsoft YaHei", "Noto Sans SC", system-ui, sans-serif;
      letter-spacing: 0;
      cursor: pointer;
      box-shadow: 6px 6px 0 var(--shadow);
      transition: transform 100ms steps(2, end), box-shadow 100ms steps(2, end);
    }

    button:hover {
      transform: translate(2px, 2px);
      box-shadow: 4px 4px 0 var(--shadow);
    }

    button:active {
      transform: translate(6px, 6px);
      box-shadow: none;
    }

    .hint {
      position: absolute;
      top: 18px;
      left: 18px;
      padding: 8px 10px;
      border: 3px solid var(--cream);
      background: rgba(16, 24, 32, 0.72);
      color: var(--cream);
      font-size: 13px;
      line-height: 1;
      box-shadow: 5px 5px 0 var(--shadow);
      pointer-events: none;
    }

    @media (max-width: 720px) {
      body {
        padding: 10px;
      }

      .journey {
        height: calc(100vh - 20px);
        min-height: 620px;
      }

      .hud {
        grid-template-columns: 1fr;
        bottom: 12px;
        left: 12px;
        right: 12px;
      }

      .message {
        min-height: 124px;
        padding: 14px;
      }

      .panel {
        grid-template-columns: 1fr auto;
        align-items: center;
        justify-items: stretch;
      }

      .pips {
        justify-content: center;
      }

      button {
        min-width: 104px;
      }

      .hint {
        top: 12px;
        left: 12px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      button {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <main class="journey" aria-label="点击向前的像素祝福旅程">
    <canvas id="pixelScene" width="960" height="540" aria-label="像素风人生阶段动画"></canvas>
    <div class="hint">点击画面向前走</div>
    <section class="hud" aria-live="polite">
      <div class="message">
        <span class="badge">5月20日祝福</span>
        <h1 id="stageTitle">从今天出发</h1>
        <p id="stageLine" class="line">点一下，向前走。</p>
      </div>
      <div class="panel">
        <div id="pips" class="pips" aria-label="阶段进度"></div>
        <button id="advanceBtn" type="button">继续</button>
      </div>
    </section>
  </main>

  <script>
    (function () {
      "use strict";

      const canvas = document.getElementById("pixelScene");
      const ctx = canvas.getContext("2d");
      const title = document.getElementById("stageTitle");
      const line = document.getElementById("stageLine");
      const advanceBtn = document.getElementById("advanceBtn");
      const pips = document.getElementById("pips");

      const STAGES = [
        {
          kind: "start",
          title: "从今天出发",
          line: "点一下，向前走。",
          x: 94,
          color: "#ffd36b"
        },
        {
          kind: "doctor",
          title: "博士毕业",
          line: "祝贺你顺利从西南财经大学毕业。",
          x: 274,
          color: "#79c7d8"
        },
        {
          kind: "offer",
          title: "新的讲台",
          line: "愿成都理工教职 offer 顺利落定。",
          x: 462,
          color: "#e86a7a"
        },
        {
          kind: "work",
          title: "认真工作",
          line: "愿研究和课堂都有回响。",
          x: 650,
          color: "#66bf7a"
        },
        {
          kind: "life",
          title: "开心生活",
          line: "比工作顺利更重要。",
          x: 838,
          color: "#ffd36b"
        }
      ];

      const state = {
        stage: 0,
        walkerX: STAGES[0].x,
        step: 0,
        confetti: []
      };

      const palette = {
        ink: "#16222c",
        line: "#101820",
        skyTop: "#243a4a",
        skyBottom: "#6eb4b4",
        hillBack: "#315761",
        hillFront: "#2f6f73",
        grass: "#3b875f",
        grassDark: "#27624d",
        road: "#d9b46a",
        roadDark: "#a97648",
        cream: "#fff1c7",
        gold: "#ffd36b",
        rose: "#e86a7a",
        blue: "#79c7d8",
        leaf: "#66bf7a",
        purple: "#3d334d"
      };

      function setupPips() {
        pips.innerHTML = "";
        STAGES.forEach(function (_, index) {
          const pip = document.createElement("span");
          pip.className = index === 0 ? "pip active" : "pip";
          pips.appendChild(pip);
        });
      }

      function setStage(index) {
        state.stage = index;
        const stage = STAGES[index];
        title.textContent = stage.title;
        line.textContent = stage.line;
        advanceBtn.textContent = index === STAGES.length - 1 ? "再走一次" : "继续";
        Array.from(pips.children).forEach(function (pip, pipIndex) {
          pip.classList.toggle("active", pipIndex <= index);
        });
        burst(stage.x, 248, stage.color);
      }

      function advanceStage() {
        const next = state.stage === STAGES.length - 1 ? 0 : state.stage + 1;
        setStage(next);
      }

      function resize() {
        const box = canvas.getBoundingClientRect();
        const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
        canvas.width = Math.round(box.width * dpr);
        canvas.height = Math.round(box.height * dpr);
        ctx.imageSmoothingEnabled = false;
      }

      function view() {
        const scale = Math.max(canvas.width / 960, canvas.height / 540);
        const visibleWorldWidth = canvas.width / scale;
        const focusX = visibleWorldWidth < 700 ? state.walkerX : 480;
        const minOx = canvas.width - 960 * scale;
        const centeredOx = canvas.width / 2 - focusX * scale;
        const ox = Math.max(minOx, Math.min(0, centeredOx));
        const oy = (canvas.height - 540 * scale) / 2;
        return { scale, ox, oy };
      }

      function px(x, y, w, h, color) {
        const v = view();
        ctx.fillStyle = color;
        ctx.fillRect(
          Math.round(v.ox + x * v.scale),
          Math.round(v.oy + y * v.scale),
          Math.ceil(w * v.scale),
          Math.ceil(h * v.scale)
        );
      }

      function label(value, x, y, size, color, align) {
        const v = view();
        ctx.fillStyle = color;
        ctx.font = "900 " + Math.round(size * v.scale) + "px 'PingFang SC', 'Microsoft YaHei', sans-serif";
        ctx.textAlign = align || "center";
        ctx.textBaseline = "top";
        ctx.fillText(value, Math.round(v.ox + x * v.scale), Math.round(v.oy + y * v.scale));
      }

      function outlinedText(value, x, y, size, color) {
        label(value, x + 2, y + 2, size, "rgba(0,0,0,0.35)");
        label(value, x, y, size, color);
      }

      function rect(x, y, w, h, fill, border) {
        px(x, y, w, h, border || palette.line);
        px(x + 4, y + 4, w - 8, h - 8, fill);
      }

      function drawSky() {
        const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        grad.addColorStop(0, palette.skyTop);
        grad.addColorStop(0.58, palette.skyBottom);
        grad.addColorStop(1, "#4c8b6a");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let i = 0; i < 24; i += 1) {
          const x = (i * 71 + 33) % 930;
          const y = 28 + (i * 43) % 130;
          const pulse = Math.sin(state.step / 34 + i) > 0.45 ? 2 : 0;
          px(x, y, 4 + pulse, 4 + pulse, "#fff6bd");
        }

        px(760, 52, 58, 58, palette.gold);
        px(750, 68, 78, 18, "rgba(255,211,107,0.28)");
      }

      function drawCloud(x, y, drift) {
        const dx = Math.round(Math.sin(state.step / 80 + drift) * 10);
        px(x + dx, y + 16, 92, 18, "#bfe2e4");
        px(x + 10 + dx, y + 8, 32, 24, "#fff6df");
        px(x + 38 + dx, y, 42, 32, "#fff6df");
        px(x + 66 + dx, y + 12, 32, 20, "#fff6df");
      }

      function drawGround() {
        drawCloud(96, 88, 0);
        drawCloud(516, 70, 2.4);

        px(0, 304, 960, 96, palette.hillBack);
        for (let x = -40; x < 1010; x += 96) {
          px(x, 278 + Math.sin((x + state.step) / 100) * 8, 128, 116, palette.hillFront);
        }
        px(0, 392, 960, 148, palette.grass);
        px(0, 462, 960, 78, palette.grassDark);

        px(72, 374, 816, 86, palette.roadDark);
        px(82, 384, 796, 58, palette.road);
        for (let i = 0; i < 18; i += 1) {
          px(104 + i * 44, 411, 22, 5, "#fff0b7");
        }
      }

      function drawMarker(stage, index) {
        const x = stage.x;
        const active = index <= state.stage;
        const color = active ? stage.color : "#7a837b";

        px(x - 6, 290, 12, 94, palette.line);
        px(x - 28, 258, 56, 40, palette.line);
        px(x - 22, 264, 44, 28, color);

        if (stage.kind === "doctor") {
          px(x - 18, 230, 36, 18, palette.purple);
          px(x - 30, 246, 60, 8, palette.purple);
          px(x + 20, 250, 4, 24, palette.gold);
        } else if (stage.kind === "offer") {
          rect(x - 24, 222, 48, 42, palette.cream);
          px(x - 16, 237, 32, 4, palette.rose);
          px(x - 16, 249, 24, 4, palette.rose);
        } else if (stage.kind === "work") {
          rect(x - 30, 214, 60, 56, "#9fdad1");
          px(x - 14, 236, 10, 12, active ? palette.gold : "#789091");
          px(x + 8, 236, 10, 12, active ? palette.gold : "#789091");
        } else if (stage.kind === "life") {
          px(x - 24, 238, 48, 32, palette.rose);
          px(x - 14, 226, 12, 12, palette.rose);
          px(x + 2, 226, 12, 12, palette.rose);
          px(x - 4, 242, 10, 10, palette.gold);
        } else {
          px(x - 14, 232, 28, 38, palette.gold);
          px(x - 24, 246, 48, 10, palette.gold);
        }

        if (active) {
          px(x - 40, 348, 80, 8, "rgba(255,241,199,0.5)");
          outlinedText(index + 1, x, 306, 20, palette.cream);
        }
      }

      function drawWalker() {
        const target = STAGES[state.stage].x;
        state.walkerX += (target - state.walkerX) * 0.08;
        const moving = Math.abs(target - state.walkerX) > 1;
        const bob = moving ? Math.round(Math.sin(state.step / 5) * 4) : 0;
        const narrow = canvas.width / view().scale < 700;
        const x = state.walkerX;
        const y = (narrow ? 286 : 300) + bob;

        px(x - 14, y + 70, 10, 32, palette.line);
        px(x + 10, y + 70, 10, 32, palette.line);
        px(x - 19, y + 98, 24, 8, palette.cream);
        px(x + 7, y + 98, 24, 8, palette.cream);
        px(x - 22, y + 30, 48, 48, "#e86a7a");
        px(x - 28, y + 38, 10, 34, "#f2c09b");
        px(x + 24, y + 38, 10, 34, "#f2c09b");
        px(x - 18, y + 2, 40, 34, "#f2c09b");
        px(x - 24, y - 4, 52, 18, palette.line);
        px(x - 8, y + 20, 5, 5, palette.line);
        px(x + 10, y + 20, 5, 5, palette.line);
        px(x - 2, y + 29, 14, 4, "#a94455");

        if (state.stage >= 1) {
          px(x - 34, y + 42, 18, 12, palette.cream);
        }
        if (state.stage >= 3) {
          px(x + 32, y + 48, 38, 8, palette.leaf);
          px(x + 64, y + 40, 14, 14, palette.rose);
        }
      }

      function drawFlowers() {
        const count = Math.max(0, state.stage - 1) * 9;
        for (let i = 0; i < count; i += 1) {
          const x = 112 + (i * 83) % 760;
          const y = 466 + (i * 37) % 44;
          px(x + 6, y + 14, 4, 20, palette.leaf);
          px(x, y + 22, 12, 4, palette.leaf);
          px(x + 10, y + 16, 12, 4, palette.leaf);
          px(x, y, 18, 18, i % 2 ? palette.rose : palette.gold);
          px(x + 5, y + 5, 8, 8, palette.cream);
        }
      }

      function burst(x, y, color) {
        for (let i = 0; i < 26; i += 1) {
          state.confetti.push({
            x: x,
            y: y,
            vx: Math.cos(i / 26 * Math.PI * 2) * (1.2 + i % 4 * 0.3),
            vy: Math.sin(i / 26 * Math.PI * 2) * (1.1 + i % 5 * 0.2),
            life: 34 + i % 8,
            color: i % 3 === 0 ? color : i % 3 === 1 ? palette.cream : palette.gold
          });
        }
      }

      function drawConfetti() {
        state.confetti.forEach(function (piece) {
          piece.life -= 1;
          piece.x += piece.vx;
          piece.y += piece.vy;
          piece.vy += 0.035;
          px(piece.x, piece.y, 6, 6, piece.color);
        });
        state.confetti = state.confetti.filter(function (piece) {
          return piece.life > 0;
        });
      }

      function draw() {
        state.step += 1;
        drawSky();
        drawGround();
        STAGES.forEach(drawMarker);
        drawFlowers();
        drawWalker();
        drawConfetti();
        requestAnimationFrame(draw);
      }

      setupPips();
      setStage(0);
      resize();
      window.addEventListener("resize", resize);
      canvas.addEventListener("click", advanceStage);
      advanceBtn.addEventListener("click", advanceStage);
      window.addEventListener("keydown", function (event) {
        if (event.key === " " || event.key === "Enter" || event.key === "ArrowRight") {
          event.preventDefault();
          advanceStage();
        }
      });
      requestAnimationFrame(draw);
    }());
  </script>
</body>
</html>
